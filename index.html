<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F2C200">
    <meta name="description" content="Generador de Tarjetas QR y Buscador de Stock">
    <title>QR Cards - Generador y Stock</title>
    <link rel="manifest" href="/mi-app-qr/manifest.json">
    
    <!-- ===== CSS SEPARADO POR MÓDULOS ===== -->
    <link rel="stylesheet" href="/mi-app-qr/css/base.css">
    <link rel="stylesheet" href="/mi-app-qr/css/qr-generator.css">
    <link rel="stylesheet" href="/mi-app-qr/css/stock-finder.css">
    
    <!-- Bibliotecas externas -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        
        <!-- ===== HEADER CON NAVEGACIÓN ===== -->
        <header class="app-header">
            <div class="header-top">
                <h1>📱 QR Cards</h1>
                <div class="nav-arrows">
                    <button id="navPrev" class="nav-arrow" disabled>◀</button>
                    <span id="screenIndicator" class="screen-indicator">1/2</span>
                    <button id="navNext" class="nav-arrow">▶</button>
                </div>
            </div>
            <div class="header-bottom">
                <span id="screenTitle" class="screen-title">Generador de QR</span>
            </div>
        </header>

        <!-- ===== CONTENEDOR DE PANTALLAS ===== -->
        <div class="screens-container">
            
            <!-- ===== PANTALLA 1: GENERADOR QR ===== -->
            <section id="screenQR" class="screen active" data-screen="qr">
                <div id="messageQR" class="message"></div>

                <div class="search-section">
                    <label for="searchInputQR">🔍 Buscar (por ID o Código)</label>
                    <input type="text" id="searchInputQR" placeholder="Ej: 162514 o TALLER..." autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="activoSelectQR">📋 Seleccionar activo</label>
                    <select id="activoSelectQR"><option value="">-- Cargando... --</option></select>
                </div>

                <button class="btn btn-primary" id="generateBtnQR">✨ Generar Tarjeta</button>

                <div id="cardContainerQR" class="card-container">
                    <div id="cardNumberQR" class="card-number"></div>
                    <div id="cardQrQR" class="card-qr"></div>
                    <div id="cardCodeQR" class="card-code"></div>
                    <div id="cardDescQR" class="card-desc"></div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="downloadCardBtnQR">📥 Descargar</button>
                        <button class="btn btn-success" id="shareCardBtnQR">📤 Compartir</button>
                    </div>
                </div>

                <div id="loadingQR" class="loading">
                    <div class="spinner"></div>
                    <p>Generando tarjeta...</p>
                </div>
            </section>

            <!-- ===== PANTALLA 2: BUSCADOR DE STOCK ===== -->
            <section id="screenStock" class="screen" data-screen="stock">
                <div class="header-stock">
                    <h2>📦 Buscador de Stock</h2>
                    <p>Consulta el stock de productos en tiempo real</p>
                </div>

                <div id="messageStock" class="message"></div>

                <div class="search-section">
                    <label for="searchInputStock">🔎 Buscar producto (por código o descripción)</label>
                    <input type="text" id="searchInputStock" placeholder="Ej: 12345 o 'martillo'" autocomplete="off">
                </div>

                <button class="btn btn-primary" id="searchStockBtn">🔍 Buscar en Stock</button>

                <div id="resultsContainerStock" class="results-container">
                    <h3>Resultados de la búsqueda</h3>
                    <div id="stockResultsList" class="stock-results-list"></div>
                </div>

                <div id="loadingStock" class="loading">
                    <div class="spinner"></div>
                    <p>Buscando en el stock...</p>
                </div>
            </section>

        </div>

        <footer class="app-footer">
            <p>© 2026 - QR Cards Generator</p>
        </footer>
    </div>

    <!-- ===== JAVASCRIPT MODULAR ===== -->
    <script type="module" src="/mi-app-qr/js/app.js"></script>
</body>
</html>
