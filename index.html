<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F2C200">
    <title>QR Cards - Generador y Stock</title>
    <link rel="manifest" href="/QR-Cards-Generator/manifest.json">
    
    <style>
        /* ========== RESET ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px;
        }

        /* ========== HEADER ========== */
        .app-header {
            background: #F2C200;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-top h1 {
            font-size: 1.3rem;
            color: #1a1a2e;
            margin: 0;
        }
        .nav-arrows {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-arrow {
            background: rgba(26, 26, 46, 0.15);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-arrow:hover:not(:disabled) {
            background: rgba(26, 26, 46, 0.3);
        }
        .nav-arrow:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .screen-indicator {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1a1a2e;
            min-width: 32px;
            text-align: center;
        }
        .header-bottom {
            margin-top: 6px;
            text-align: center;
        }
        .screen-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1a1a2e;
            opacity: 0.8;
        }

        /* ========== PANTALLAS ========== */
        .screens-container {
            position: relative;
            min-height: 400px;
            touch-action: pan-y;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== COMPONENTES ========== */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-primary { background: #F2C200; color: #1a1a2e; }
        .btn-secondary { background: #1a1a2e; color: white; }
        .btn-success { background: #28a745; color: white; }

        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #F2C200;
            box-shadow: 0 0 0 3px rgba(242, 194, 0, 0.2);
        }
        .search-section { margin-bottom: 15px; }

        /* ========== MENSAJES ========== */
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
        }
        .message-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .message-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .message-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }

        /* ========== LOADING ========== */
        .loading { display: none; text-align: center; padding: 40px 20px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #F2C200;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== QR ========== */
        #cardContainerQR {
            background: #F2C200;
            border-radius: 20px;
            padding: 30px 20px;
            margin-top: 20px;
            display: none;
        }
        #cardContainerQR.visible { display: block; }
        #cardNumberQR {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
            background: rgba(255, 255, 255, 0.9);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        #cardQrQR { margin: 20px 0; display: flex; justify-content: center; }
        #cardQrQR canvas {
            width: 220px;
            height: 220px;
            border: 4px solid white;
            border-radius: 20px;
            padding: 10px;
            background: white;
        }
        #cardCodeQR {
            font-size: 16px;
            font-weight: bold;
            color: #1a1a2e;
            background: rgba(255, 255, 255, 0.9);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }
        #cardDescQR {
            font-size: 13px;
            color: #1a1a2e;
            background: rgba(255, 255, 255, 0.8);
            display: inline-block;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 90%;
            margin-top: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .action-buttons .btn { flex: 1; margin-top: 0; }

        /* ========== STOCK ========== */
        .header-stock {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header-stock h2 { font-size: 1.3rem; margin-bottom: 4px; }
        .header-stock p { font-size: 0.85rem; opacity: 0.8; }
        #resultsContainerStock {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            display: none;
        }
        #resultsContainerStock.visible { display: block; }
        #resultsContainerStock h3 {
            font-size: 1rem;
            color: #1a1a2e;
            margin-bottom: 12px;
            border-bottom: 2px solid #F2C200;
            padding-bottom: 8px;
        }
        #stockResultsList {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        .stock-item {
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            border-left: 4px solid #F2C200;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-item .code {
            font-weight: 600;
            color: #1a1a2e;
            font-family: 'Courier New', monospace;
            min-width: 80px;
        }
        .stock-item .desc { flex: 1; margin: 0 12px; color: #333; }
        .stock-item .stock-qty {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #28a745;
            color: white;
        }
        .stock-item .stock-qty.low { background: #dc3545; }
        .stock-item .stock-qty.medium { background: #ffc107; color: #1a1a2e; }
        .stock-not-found {
            text-align: center;
            padding: 30px 20px;
            color: #6c757d;
        }
        .stock-not-found .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* ========== FOOTER ========== */
        .app-footer {
            text-align: center;
            padding: 16px 0 4px;
            font-size: 0.75rem;
            color: #999;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .header-top h1 { font-size: 1.1rem; }
            .nav-arrow { width: 32px; height: 32px; font-size: 14px; }
            #cardQrQR canvas { width: 180px; height: 180px; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn { margin-top: 6px; }
            .stock-item { flex-wrap: wrap; gap: 6px; }
            .stock-item .desc { margin: 4px 0; width: 100%; }
        }
    </style>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="header-top">
                <h1>📱 QR Cards</h1>
                <div class="nav-arrows">
                    <button id="navPrev" class="nav-arrow" disabled>◀</button>
                    <span id="screenIndicator" class="screen-indicator">1/2</span>
                    <button id="navNext" class="nav-arrow">▶</button>
                </div>
            </div>
            <div class="header-bottom">
                <span id="screenTitle" class="screen-title">Generador de QR</span>
            </div>
        </header>

        <!-- ===== PANTALLAS ===== -->
        <div class="screens-container" id="screensContainer">

            <!-- PANTALLA 1: QR -->
            <section id="screenQR" class="screen active">
                <div id="messageQR" class="message"></div>

                <div class="search-section">
                    <label for="searchInputQR">🔍 Buscar (por ID o Código)</label>
                    <input type="text" id="searchInputQR" placeholder="Ej: 162514 o TALLER...">
                </div>

                <div class="form-group">
                    <label for="activoSelectQR">📋 Seleccionar activo</label>
                    <select id="activoSelectQR"><option value="">-- Cargando... --</option></select>
                </div>

                <button class="btn btn-primary" id="generateBtnQR">✨ Generar Tarjeta</button>

                <div id="cardContainerQR">
                    <div id="cardNumberQR" class="card-number"></div>
                    <div id="cardQrQR" class="card-qr"></div>
                    <div id="cardCodeQR" class="card-code"></div>
                    <div id="cardDescQR" class="card-desc"></div>
                    <div class="action-buttons">
                        <button class="btn btn-secondary" id="downloadCardBtnQR">📥 Descargar</button>
                        <button class="btn btn-success" id="shareCardBtnQR">📤 Compartir</button>
                    </div>
                </div>

                <div id="loadingQR" class="loading">
                    <div class="spinner"></div>
                    <p>Generando tarjeta...</p>
                </div>
            </section>

            <!-- PANTALLA 2: STOCK -->
            <section id="screenStock" class="screen">
                <div class="header-stock">
                    <h2>📦 Buscador de Stock</h2>
                    <p>Consulta el stock de productos</p>
                </div>

                <div id="messageStock" class="message"></div>

                <div class="search-section">
                    <label for="searchInputStock">🔎 Buscar producto</label>
                    <input type="text" id="searchInputStock" placeholder="Ej: 12345 o 'martillo'">
                </div>

                <button class="btn btn-primary" id="searchStockBtn">🔍 Buscar en Stock</button>

                <div id="resultsContainerStock">
                    <h3>Resultados</h3>
                    <div id="stockResultsList" class="stock-results-list"></div>
                </div>

                <div id="loadingStock" class="loading">
                    <div class="spinner"></div>
                    <p>Buscando...</p>
                </div>
            </section>

        </div>

        <footer class="app-footer">
            <p>© 2026 - QR Cards Generator</p>
        </footer>
    </div>

    <!-- ===== JAVASCRIPT COMPLETO ===== -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            //  NAVEGACIÓN
            // ============================================================
            const screens = document.querySelectorAll('.screen');
            const navPrev = document.getElementById('navPrev');
            const navNext = document.getElementById('navNext');
            const screenIndicator = document.getElementById('screenIndicator');
            const screenTitle = document.getElementById('screenTitle');
            const screenTitles = ['Generador de QR', 'Buscador de Stock'];
            let currentIndex = 0;

            function goTo(index) {
                if (index < 0 || index >= screens.length) return;
                screens.forEach(s => s.classList.remove('active'));
                screens[index].classList.add('active');
                currentIndex = index;
                screenIndicator.textContent = `${index + 1}/${screens.length}`;
                screenTitle.textContent = screenTitles[index];
                navPrev.disabled = (index === 0);
                navNext.disabled = (index === screens.length - 1);
            }

            navPrev.addEventListener('click', () => goTo(currentIndex - 1));
            navNext.addEventListener('click', () => goTo(currentIndex + 1));
            goTo(0);

            // ============================================================
            //  SWIPE
            // ============================================================
            const container = document.getElementById('screensContainer');
            let touchStartX = 0;
            let touchEndX = 0;
            const SWIPE_THRESHOLD = 50;

            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) < SWIPE_THRESHOLD) return;
                if (diff > 0 && currentIndex < screens.length - 1) {
                    goTo(currentIndex + 1);
                } else if (diff < 0 && currentIndex > 0) {
                    goTo(currentIndex - 1);
                }
            }, { passive: true });

            // Mouse support
            let mouseStartX = 0;
            let isMouseDown = false;

            container.addEventListener('mousedown', (e) => {
                mouseStartX = e.screenX;
                isMouseDown = true;
            });

            container.addEventListener('mouseup', (e) => {
                if (!isMouseDown) return;
                isMouseDown = false;
                const diff = mouseStartX - e.screenX;
                if (Math.abs(diff) < SWIPE_THRESHOLD) return;
                if (diff > 0 && currentIndex < screens.length - 1) {
                    goTo(currentIndex + 1);
                } else if (diff < 0 && currentIndex > 0) {
                    goTo(currentIndex - 1);
                }
            });

            // ============================================================
            //  UTILIDADES
            // ============================================================
            function mostrarMensaje(id, texto, tipo = 'info', duracion = 3000) {
                const msg = document.getElementById(id);
                if (!msg) return;
                msg.textContent = texto;
                msg.className = `message message-${tipo}`;
                msg.style.display = 'block';
                if (duracion > 0) {
                    setTimeout(() => { msg.style.display = 'none'; }, duracion);
                }
            }

            function limpiarId(idRaw) {
                let idStr = String(idRaw);
                if (idStr.includes('.')) idStr = idStr.split('.')[0];
                return idStr;
            }

            function generarQR(texto, width = 200, margin = 1) {
                return new Promise((resolve, reject) => {
                    const canvas = document.createElement('canvas');
                    QRCode.toCanvas(canvas, texto, { width, margin }, (error) => {
                        if (error) reject(error);
                        else resolve(canvas);
                    });
                });
            }

            // ============================================================
            //  MÓDULO QR
            // ============================================================
            let excelData = [];
            let filteredData = [];
            let currentItem = null;
            let cachedImage = null;

            const qrElements = {
                searchInput: document.getElementById('searchInputQR'),
                activoSelect: document.getElementById('activoSelectQR'),
                generateBtn: document.getElementById('generateBtnQR'),
                downloadBtn: document.getElementById('downloadCardBtnQR'),
                shareBtn: document.getElementById('shareCardBtnQR'),
                cardContainer: document.getElementById('cardContainerQR'),
                cardNumber: document.getElementById('cardNumberQR'),
                cardQr: document.getElementById('cardQrQR'),
                cardCode: document.getElementById('cardCodeQR'),
                cardDesc: document.getElementById('cardDescQR'),
                loading: document.getElementById('loadingQR'),
                messageId: 'messageQR'
            };

            async function cargarExcelQR() {
                mostrarMensaje(qrElements.messageId, 'Cargando archivo QR...', 'info', 0);
                try {
                    const response = await fetch('/mi-app-qr/data/DOC-20251215-WA0003..xlsx');
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    excelData = json
                        .filter(r => r.ID_ACTIVO_ARBOL && r.CODIGO_IDENTIFICATIVO)
                        .map(r => ({
                            id: limpiarId(r.ID_ACTIVO_ARBOL),
                            codigo: String(r.CODIGO_IDENTIFICATIVO).trim(),
                            desc: r.DESCRIPCION ? String(r.DESCRIPCION).trim() : 'Sin descripción'
                        }));
                    filteredData = [];
                    poblarSelectQR();
                    mostrarMensaje(qrElements.messageId, `✅ ${excelData.length} activos cargados`, 'success');
                } catch (e) {
                    console.error('Error QR:', e);
                    mostrarMensaje(qrElements.messageId, `⚠️ Error: ${e.message}`, 'error');
                }
            }

            function poblarSelectQR() {
                const data = filteredData.length > 0 ? filteredData : excelData;
                const select = qrElements.activoSelect;
                select.innerHTML = '<option value="">-- Seleccionar --</option>';
                data.forEach((item) => {
                    const opt = document.createElement('option');
                    const realIndex = excelData.findIndex(d => d.id === item.id && d.codigo === item.codigo);
                    opt.value = realIndex;
                    const label = item.desc.length > 50 ? item.desc.substring(0, 50) + '...' : item.desc;
                    opt.textContent = `${item.codigo} - ${label}`;
                    select.appendChild(opt);
                });
            }

            // Buscador QR
            qrElements.searchInput.addEventListener('input', function() {
                const term = this.value.toLowerCase().trim();
                if (!term) { filteredData = []; poblarSelectQR(); return; }
                filteredData = excelData.filter(item =>
                    item.id === term || item.id.includes(term) ||
                    item.codigo.toLowerCase().includes(term) ||
                    item.desc.toLowerCase().includes(term)
                );
                poblarSelectQR();
                if (filteredData.length === 0) {
                    mostrarMensaje(qrElements.messageId, '🔍 No se encontraron resultados', 'info');
                } else {
                    mostrarMensaje(qrElements.messageId, `🔍 ${filteredData.length} resultados`, 'success');
                }
            });

            qrElements.activoSelect.addEventListener('change', function() {
                const index = parseInt(this.value);
                if (isNaN(index) || index < 0 || !excelData[index]) { currentItem = null; return; }
                currentItem = excelData[index];
                mostrarMensaje(qrElements.messageId, `✅ Seleccionado: ${currentItem.codigo}`, 'success');
            });

            async function mostrarTarjeta(id, codigo, desc) {
                const container = qrElements.cardQr;
                container.innerHTML = '';
                const canvas = await generarQR(id, 200, 1);
                container.appendChild(canvas);
                qrElements.cardNumber.textContent = id;
                qrElements.cardCode.textContent = codigo;
                qrElements.cardDesc.textContent = desc || 'Sin descripción';
                qrElements.cardContainer.classList.add('visible');
            }

            qrElements.generateBtn.addEventListener('click', async function() {
                if (!currentItem) {
                    mostrarMensaje(qrElements.messageId, '❌ Selecciona un activo', 'error');
                    return;
                }
                qrElements.loading.style.display = 'block';
                qrElements.cardContainer.classList.remove('visible');
                try {
                    const { id, codigo, desc } = currentItem;
                    await mostrarTarjeta(id, codigo, desc);
                    // Generar imagen para descarga
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 540;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#F2C200';
                    ctx.fillRect(0, 0, 400, 540);
                    // ID
                    const idTexto = String(id);
                    ctx.font = 'bold 26px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    const idWidth = ctx.measureText(idTexto).width + 50;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    ctx.beginPath();
                    ctx.moveTo(200 - idWidth/2 + 24, 20);
                    ctx.lineTo(200 + idWidth/2 - 24, 20);
                    ctx.quadraticCurveTo(200 + idWidth/2, 20, 200 + idWidth/2, 20+24);
                    ctx.lineTo(200 + idWidth/2, 20+48-24);
                    ctx.quadraticCurveTo(200 + idWidth/2, 20+48, 200 + idWidth/2 - 24, 20+48);
                    ctx.lineTo(200 - idWidth/2 + 24, 20+48);
                    ctx.quadraticCurveTo(200 - idWidth/2, 20+48, 200 - idWidth/2, 20+48-24);
                    ctx.lineTo(200 - idWidth/2, 20+24);
                    ctx.quadraticCurveTo(200 - idWidth/2, 20, 200 - idWidth/2 + 24, 20);
                    ctx.fill();
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillText(idTexto, 200, 52);
                    // QR
                    const qrCanvas = await generarQR(id, 200, 1);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.moveTo(200 - 110, 72);
                    ctx.lineTo(200 + 110, 72);
                    ctx.quadraticCurveTo(200 + 110, 72, 200 + 110, 72+20);
                    ctx.lineTo(200 + 110, 72+200+20);
                    ctx.quadraticCurveTo(200 + 110, 72+200+20, 200 + 110 - 20, 72+200+20);
                    ctx.lineTo(200 - 110 + 20, 72+200+20);
                    ctx.quadraticCurveTo(200 - 110, 72+200+20, 200 - 110, 72+200+20-20);
                    ctx.lineTo(200 - 110, 72+20);
                    ctx.quadraticCurveTo(200 - 110, 72, 200 - 110 + 20, 72);
                    ctx.fill();
                    ctx.drawImage(qrCanvas, 200 - 100, 82, 200, 200);
                    // Código
                    const codTexto = String(codigo);
                    ctx.font = 'bold 15px "Courier New", monospace';
                    const codWidth = ctx.measureText(codTexto).width + 50;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.beginPath();
                    ctx.moveTo(200 - codWidth/2 + 20, 305);
                    ctx.lineTo(200 + codWidth/2 - 20, 305);
                    ctx.quadraticCurveTo(200 + codWidth/2, 305, 200 + codWidth/2, 305+20);
                    ctx.lineTo(200 + codWidth/2, 305+40-20);
                    ctx.quadraticCurveTo(200 + codWidth/2, 305+40, 200 + codWidth/2 - 20, 305+40);
                    ctx.lineTo(200 - codWidth/2 + 20, 305+40);
                    ctx.quadraticCurveTo(200 - codWidth/2, 305+40, 200 - codWidth/2, 305+40-20);
                    ctx.lineTo(200 - codWidth/2, 305+20);
                    ctx.quadraticCurveTo(200 - codWidth/2, 305, 200 - codWidth/2 + 20, 305);
                    ctx.fill();
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillText(codTexto, 200, 333);
                    // Descripción
                    const descTexto = desc || 'Sin descripción';
                    ctx.font = '12px "Segoe UI", monospace';
                    const maxWidth = 300;
                    let lines = [], currentLine = '';
                    for (let char of descTexto) {
                        let testLine = currentLine + char;
                        if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) {
                            lines.push(currentLine);
                            currentLine = char;
                        } else { currentLine = testLine; }
                    }
                    if (currentLine) lines.push(currentLine);
                    const lineHeight = 20;
                    const descHeight = (lines.length * lineHeight) + 24;
                    const descY = 365;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
                    ctx.beginPath();
                    ctx.moveTo(50 + 16, descY);
                    ctx.lineTo(350 - 16, descY);
                    ctx.quadraticCurveTo(350, descY, 350, descY+16);
                    ctx.lineTo(350, descY+descHeight-16);
                    ctx.quadraticCurveTo(350, descY+descHeight, 350-16, descY+descHeight);
                    ctx.lineTo(50+16, descY+descHeight);
                    ctx.quadraticCurveTo(50, descY+descHeight, 50, descY+descHeight-16);
                    ctx.lineTo(50, descY+16);
                    ctx.quadraticCurveTo(50, descY, 50+16, descY);
                    ctx.fill();
                    ctx.fillStyle = '#1a1a2e';
                    lines.forEach((line, i) => {
                        ctx.fillText(line, 200, descY + 20 + (i * lineHeight));
                    });
                    cachedImage = canvas.toDataURL('image/png');
                    mostrarMensaje(qrElements.messageId, '✅ Tarjeta generada', 'success');
                } catch (error) {
                    console.error(error);
                    mostrarMensaje(qrElements.messageId, '❌ Error al generar', 'error');
                } finally {
                    qrElements.loading.style.display = 'none';
                }
            });

            qrElements.downloadBtn.addEventListener('click', function() {
                if (!cachedImage) return;
                const link = document.createElement('a');
                link.download = `tarjeta-${currentItem.codigo}.png`;
                link.href = cachedImage;
                link.click();
                mostrarMensaje(qrElements.messageId, '📥 Descargada', 'success');
            });

            qrElements.shareBtn.addEventListener('click', async function() {
                if (!cachedImage) return;
                try {
                    const blob = await (await fetch(cachedImage)).blob();
                    const file = new File([blob], 'tarjeta.png', { type: 'image/png' });
                    if (navigator.share) {
                        await navigator.share({ title: 'Tarjeta QR', files: [file] });
                        mostrarMensaje(qrElements.messageId, '📤 Compartido', 'success');
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        mostrarMensaje(qrElements.messageId, '❌ Error al compartir', 'error');
                    }
                }
            });

            // ============================================================
            //  MÓDULO STOCK
            // ============================================================
            let stockData = [];

            const stockElements = {
                searchInput: document.getElementById('searchInputStock'),
                searchBtn: document.getElementById('searchStockBtn'),
                resultsContainer: document.getElementById('resultsContainerStock'),
                resultsList: document.getElementById('stockResultsList'),
                loading: document.getElementById('loadingStock'),
                messageId: 'messageStock'
            };

            async function cargarExcelStock() {
                mostrarMensaje(stockElements.messageId, 'Cargando archivo de stock...', 'info', 0);
                try {
                    const response = await fetch('/mi-app-qr/data/Materiales Almacen.xlsx');
                    if (!response.ok) throw new Error(`HTTP ${response.status}: Archivo no encontrado`);
                    const data = await response.arrayBuffer();
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    stockData = json.map(r => ({
                        codigo: String(r.CODIGO || r.CODIGO_IDENTIFICATIVO || '').trim(),
                        desc: String(r.DESCRIPCION || r.DESC || '').trim(),
                        stock: parseInt(r.STOCK || r.CANTIDAD || 0) || 0
                    }));
                    mostrarMensaje(stockElements.messageId, `✅ ${stockData.length} productos cargados`, 'success');
                    console.log('Stock cargado:', stockData);
                } catch (e) {
                    console.error('Error Stock:', e);
                    mostrarMensaje(stockElements.messageId, `⚠️ Error: ${e.message}. Asegúrate de que el archivo existe en /data/`, 'error');
                }
            }

            stockElements.searchBtn.addEventListener('click', function() {
                const term = stockElements.searchInput.value.trim();
                if (!term) {
                    mostrarMensaje(stockElements.messageId, '📝 Escribe un término de búsqueda', 'info');
                    stockElements.resultsContainer.classList.remove('visible');
                    return;
                }

                stockElements.loading.style.display = 'block';
                stockElements.resultsContainer.classList.remove('visible');

                setTimeout(() => {
                    const results = stockData.filter(item =>
                        item.codigo.toLowerCase().includes(term.toLowerCase()) ||
                        item.desc.toLowerCase().includes(term.toLowerCase())
                    );
                    mostrarResultadosStock(results);
                    stockElements.loading.style.display = 'none';
                    if (results.length === 0) {
                        mostrarMensaje(stockElements.messageId, `🔍 No se encontraron productos con "${term}"`, 'info');
                    } else {
                        mostrarMensaje(stockElements.messageId, `✅ ${results.length} productos encontrados`, 'success');
                    }
                }, 300);
            });

            stockElements.searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') stockElements.searchBtn.click();
            });

            function mostrarResultadosStock(results) {
                const list = stockElements.resultsList;
                if (results.length === 0) {
                    list.innerHTML = `<div class="stock-not-found"><span class="icon">🔍</span><p>No se encontraron productos</p></div>`;
                    stockElements.resultsContainer.classList.add('visible');
                    return;
                }

                list.innerHTML = results.map(item => {
                    const stockClass = item.stock <= 0 ? 'low' : (item.stock <= 5 ? 'medium' : '');
                    const stockLabel = item.stock <= 0 ? '❌ Agotado' : (item.stock <= 5 ? '⚠️ Bajo' : '✓ Stock');
                    return `
                        <div class="stock-item">
                            <span class="code">${item.codigo}</span>
                            <span class="desc">${item.desc}</span>
                            <span class="stock-qty ${stockClass}">${item.stock} ${stockLabel}</span>
                        </div>
                    `;
                }).join('');

                stockElements.resultsContainer.classList.add('visible');
            }

            // ============================================================
            //  INICIALIZACIÓN
            // ============================================================
            cargarExcelQR();
            cargarExcelStock();

        })();
    </script>
</body>
</html>
