<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F2C200">
    <meta name="description" content="Generador de Tarjetas QR para activos">
    <title>Generador de Tarjetas QR</title>
    
    <!-- Ruta RELATIVA al manifest -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Ruta RELATIVA al CSS -->
    <link rel="stylesheet" href="./css/styles.css">
    
    <!-- Bibliotecas externas (CDN) - Estas no cambian -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <!-- Pantalla de selección -->
        <section id="selectionScreen" class="selection-screen">
            <header class="header">
                <h1>📱 Generador de Tarjetas QR</h1>
                <p>Selecciona o busca un activo del archivo Excel</p>
            </header>

            <div id="message" class="message" role="alert" aria-live="polite"></div>

            <div class="search-section">
                <label for="searchInput">🔍 Buscar (por ID o Código)</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Ej: 162514 o TALLER..." 
                    autocomplete="off"
                    aria-label="Buscar activo"
                >
            </div>

            <div class="form-group">
                <label for="activoSelect">📋 Seleccionar activo</label>
                <select id="activoSelect" aria-label="Lista de activos">
                    <option value="">-- Cargando... --</option>
                </select>
            </div>

            <button class="btn btn-primary" id="generateBtn">
                ✨ Generar Tarjeta
            </button>
        </section>

        <!-- Pantalla de tarjeta generada -->
        <section id="cardScreen" class="card-screen" hidden>
            <div class="card-container">
                <div id="cardNumber" class="card-number"></div>
                <div id="cardQr" class="card-qr"></div>
                <div id="cardCode" class="card-code"></div>
                <div id="cardDesc" class="card-desc"></div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-secondary" id="downloadCardBtn">
                    📥 Descargar
                </button>
                <button class="btn btn-success" id="shareCardBtn">
                    📤 Compartir
                </button>
                <button class="btn btn-back" id="backBtn">
                    ◀ Nueva Tarjeta
                </button>
            </div>
        </section>

        <!-- Loading -->
        <div id="loading" class="loading" hidden>
            <div class="spinner"></div>
            <p>Generando tarjeta...</p>
        </div>
    </div>

    <!-- Aplicación modular con ruta relativa -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
